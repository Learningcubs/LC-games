<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Puzzle of the Week - Learning Cubs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--lc-orange:#FF642D;--lc-navy:#001848;--lc-warm-grey:#DBD9D2;--lc-light-grey:#EFEEEA;--lc-off-white:#F6F6F4;--handy:#53A6E2;--bubbly:#FCCF41;--puzzly:#00A0A7;--stary:#7D49C8;--correct:#43B86A;--correct-light:#E6F7ED;--wrong:#E85252;--wrong-light:#FDEBEB;--bg:var(--lc-off-white);--text:var(--lc-navy);--text-light:#4A5A7A;--shadow:0 4px 16px rgba(0,24,72,.08);--font-title:'new-spirit','New Spirit','DM Serif Display',Georgia,serif;--font-body:'roc-grotesk','Roc Grotesk','DM Sans','Helvetica Neue',sans-serif}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;opacity:.6}.bg-blob.b1{width:420px;height:420px;top:-160px;right:-100px;background:radial-gradient(circle,rgba(252,207,65,.07),transparent 65%)}.bg-blob.b2{width:360px;height:360px;bottom:-120px;left:-80px;background:radial-gradient(circle,rgba(0,160,167,.05),transparent 65%)}
.app{max-width:540px;margin:0 auto;padding:20px 16px 28px;position:relative;z-index:1}
.brand-bar{text-align:center;margin-bottom:4px}.brand-bar img{height:40px}
.header{text-align:center;margin-bottom:6px}.header h1{font-family:var(--font-title);font-size:clamp(1.4rem,5vw,2rem);font-weight:700;color:var(--lc-navy)}.header h1 .accent{color:var(--lc-orange)}.header p{color:var(--text-light);font-size:.85rem;font-weight:500;margin-top:2px}
.wave-divider{width:100%;height:16px;margin:0 0 12px;overflow:hidden}.wave-divider svg{width:100%;height:100%}

.puzzle-card{background:#fff;border-radius:20px;padding:28px 24px;box-shadow:var(--shadow);text-align:center;margin-bottom:16px}
.puzzle-card .badge{display:inline-block;padding:4px 14px;border-radius:16px;font-size:.72rem;font-weight:700;background:var(--puzzly);color:#fff;margin-bottom:10px;letter-spacing:.5px}
.puzzle-card .mascot-img{width:70px;height:70px;object-fit:contain;margin:8px auto}
.puzzle-card .puzzle-title{font-family:var(--font-title);font-size:1.5rem;font-weight:700;color:var(--lc-navy);margin:8px 0 4px}
.puzzle-card .puzzle-sub{font-size:.82rem;color:var(--text-light);font-weight:600;margin-bottom:16px}

.difficulty-tabs{display:flex;gap:6px;margin-bottom:16px;justify-content:center}
.diff-tab{padding:6px 16px;border:2px solid var(--lc-warm-grey);border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;background:#fff;color:var(--text-light)}.diff-tab:hover{border-color:var(--lc-orange)}.diff-tab.active{border-color:var(--lc-orange);background:var(--lc-orange);color:#fff}

.challenge-box{background:var(--lc-off-white);border:2.5px solid var(--lc-warm-grey);border-radius:16px;padding:24px;margin-bottom:18px;position:relative}
.challenge-box .ch-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--puzzly);margin-bottom:8px}
.challenge-box .ch-text{font-family:var(--font-title);font-size:clamp(1.1rem,3.5vw,1.35rem);font-weight:700;color:var(--lc-navy);line-height:1.45;margin-bottom:6px}
.challenge-box .ch-hint{font-size:.82rem;color:var(--text-light);font-weight:500;font-style:italic}

.answer-section{text-align:center}
.answer-section label{font-weight:700;font-size:.85rem;color:var(--text-light);display:block;margin-bottom:8px}
.answer-row{display:flex;gap:10px;justify-content:center;align-items:center}
.answer-input{width:160px;padding:12px;border:3px solid var(--lc-warm-grey);border-radius:14px;font-family:var(--font-title);font-size:1.5rem;font-weight:700;text-align:center;color:var(--text);background:#fff;outline:none;transition:border .2s}.answer-input:focus{border-color:var(--handy)}
.answer-input.correct{border-color:var(--correct);background:var(--correct-light)}
.answer-input.wrong{border-color:var(--wrong);background:var(--wrong-light);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.submit-btn{padding:12px 24px;border:none;border-radius:14px;background:var(--lc-orange);color:#fff;font-family:var(--font-body);font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(255,100,45,.25)}.submit-btn:hover{background:#E8571F;transform:translateY(-1px)}

.feedback{margin-top:16px;padding:14px;border-radius:12px;font-size:.9rem;font-weight:600;line-height:1.5;animation:fadeIn .3s;display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.feedback.show{display:block}
.feedback.right{background:var(--correct-light);color:#2D7A48;border:1.5px solid rgba(67,184,106,.2)}
.feedback.wrong-answer{background:var(--wrong-light);color:#A13030;border:1.5px solid rgba(232,82,82,.2)}

.new-puzzle-btn{display:block;margin:14px auto 0;padding:10px 24px;border:2.5px solid var(--lc-navy);border-radius:10px;background:#fff;color:var(--lc-navy);font-family:var(--font-body);font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s}.new-puzzle-btn:hover{background:var(--lc-navy);color:#fff}

.points-display{display:flex;align-items:center;justify-content:center;gap:8px;margin:14px 0;padding:8px 18px;background:#fff;border-radius:28px;box-shadow:var(--shadow);font-weight:700;font-size:.9rem;width:fit-content;margin-left:auto;margin-right:auto}
.points-display .coin{font-size:1.1rem}

.footer{text-align:center;margin-top:18px;padding-top:12px;border-top:1.5px solid var(--lc-warm-grey)}.footer a{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--text-light);font-weight:600;font-size:.72rem;letter-spacing:.3px;transition:color .2s}.footer a:hover{color:var(--lc-orange)}.footer a img{height:18px;opacity:.45}
</style>
</head>

<script>
const PUZZLES = {
  easy:[
    {title:'Number Riddle',sub:'Think carefully...',q:'I am a number. If you double me and add 3, you get 11. What number am I?',hint:'Try working backwards: 11 - 3 = ?',answer:'4',explain:'4 doubled is 8, plus 3 = 11!',points:5},
    {title:'Shape Counter',sub:'Count them up!',q:'A triangle has 3 sides. How many sides do 5 triangles have altogether?',hint:'Multiply!',answer:'15',explain:'5 × 3 = 15 sides.',points:5},
    {title:'Missing Number',sub:'Fill the gap...',q:'2, 4, 6, 8, ?, 12 — What is the missing number?',hint:'Look at the pattern. What is added each time?',answer:'10',explain:'The pattern adds 2 each time: 8 + 2 = 10.',points:5},
    {title:'Coin Puzzle',sub:'Money maths!',q:'I have three coins that add up to 30p. None of them is a 10p coin. What are my coins?',hint:'Think about 20p coins...',answer:'20p, 5p, 5p',explain:'20p + 5p + 5p = 30p. Tricky!',points:5},
    {title:'Age Puzzle',sub:'How old?',q:"Sam is 7 years old. His mum is 4 times older than him. How old is Sam's mum?",hint:'4 groups of 7...',answer:'28',explain:'4 × 7 = 28 years old.',points:5}
  ],
  medium:[
    {title:'Magic Square',sub:'All rows, columns & diagonals must equal 15.',q:'Fill the centre of this magic square:\n4  ?  8\n?  5  ?\n?  ?  ?\nWhat number goes in the centre-top position?',hint:'Each row, column, and diagonal adds to 15. Top row: 4 + ? + 8 = 15.',answer:'3',explain:'4 + 3 + 8 = 15. The full square is: 4,3,8 / 9,5,1 / 2,7,6.',points:10},
    {title:'Train Problem',sub:'Distance and speed...',q:'A train travels at 60 miles per hour. How far does it travel in 2 hours and 30 minutes?',hint:'2.5 hours × 60 mph...',answer:'150',explain:'60 × 2.5 = 150 miles.',points:10},
    {title:'Fraction Challenge',sub:'Simplify this!',q:'What is 3/4 of 120?',hint:'Find 1/4 first, then multiply by 3.',answer:'90',explain:'120 ÷ 4 = 30, then 30 × 3 = 90.',points:10},
    {title:'Area Problem',sub:'Shape maths!',q:'A rectangle is 12cm long and 8cm wide. What is its area?',hint:'Area = length × width',answer:'96',explain:'12 × 8 = 96 cm².',points:10},
    {title:'Sequence',sub:'What comes next?',q:'1, 1, 2, 3, 5, 8, 13, ? — What is the next number?',hint:'Add the two previous numbers together.',answer:'21',explain:'8 + 13 = 21. This is the Fibonacci sequence!',points:10}
  ],
  hard:[
    {title:'Algebra',sub:'Find the unknown...',q:'If 3x + 7 = 28, what is x?',hint:'Subtract 7 from both sides first.',answer:'7',explain:'3x = 21, so x = 7.',points:15},
    {title:'Percentage',sub:'Work it out!',q:'A jacket costs £80. It has a 15% discount. What is the sale price?',hint:'Find 15% of 80 first.',answer:'68',explain:'15% of £80 = £12. £80 - £12 = £68.',points:15},
    {title:'Ratio Problem',sub:'Share it fairly...',q:'£240 is shared between Alex and Ben in the ratio 3:5. How much does Ben receive?',hint:'3 + 5 = 8 parts total. Find the value of one part.',answer:'150',explain:'8 parts = £240, so 1 part = £30. Ben gets 5 × £30 = £150.',points:15},
    {title:'Volume',sub:'3D maths!',q:'A cube has sides of 5cm. What is its volume in cm³?',hint:'Volume of a cube = side × side × side.',answer:'125',explain:'5 × 5 × 5 = 125 cm³.',points:15},
    {title:'Probability',sub:'What are the odds?',q:'A bag has 3 red balls, 5 blue balls, and 2 green balls. What is the probability of picking a blue ball? Give as a simplified fraction.',hint:'Total balls = 10. Blue = 5.',answer:'1/2',explain:'5 out of 10 = 5/10 = 1/2.',points:15}
  ]
};

let difficulty='easy', puzzleIdx=0, totalPoints=0, answered=false;

function setDiff(d,btn){
  difficulty=d;
  document.querySelectorAll('.diff-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  puzzleIdx=0;answered=false;
  loadPuzzle();
}

function loadPuzzle(){
  const pool=PUZZLES[difficulty];
  if(puzzleIdx>=pool.length)puzzleIdx=0;
  const p=pool[puzzleIdx];
  document.getElementById('puzzle-title').textContent=p.title;
  document.getElementById('puzzle-sub').textContent=p.sub;
  document.getElementById('ch-text').textContent=p.q;
  document.getElementById('ch-hint').textContent='💡 Hint: '+p.hint;
  document.getElementById('ch-label').textContent=difficulty==='easy'?'KS1 Challenge':difficulty==='medium'?'KS2 Challenge':'KS3 Challenge';
  document.getElementById('answer-input').value='';
  document.getElementById('answer-input').className='answer-input';
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').innerHTML='';
  document.getElementById('new-btn').style.display='none';
  answered=false;
}

function checkAnswer(){
  if(answered)return;
  const p=PUZZLES[difficulty][puzzleIdx];
  const inp=document.getElementById('answer-input');
  const val=inp.value.trim().toLowerCase().replace(/\s+/g,'');
  const correct=val===p.answer.toLowerCase().replace(/\s+/g,'');
  const fb=document.getElementById('feedback');
  
  if(!val)return;
  answered=true;
  
  if(correct){
    inp.classList.add('correct');
    totalPoints+=p.points;
    document.getElementById('points').textContent=totalPoints;
    fb.className='feedback show right';
    fb.innerHTML='<strong>✅ Correct!</strong> '+p.explain+' <strong>+'+p.points+' cubs points!</strong> 🐾';
  }else{
    inp.classList.add('wrong');
    fb.className='feedback show wrong-answer';
    fb.innerHTML='<strong>❌ Not quite.</strong> The answer is <strong>'+p.answer+'</strong>. '+p.explain;
  }
  document.getElementById('new-btn').style.display='block';
}

function newPuzzle(){
  puzzleIdx++;
  loadPuzzle();
}

document.getElementById('answer-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkAnswer()});
loadPuzzle();
</script>
