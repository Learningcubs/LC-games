<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Fix-It - Learning Cubs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--lc-orange:#FF642D;--lc-navy:#001848;--lc-warm-grey:#DBD9D2;--lc-light-grey:#EFEEEA;--lc-off-white:#F6F6F4;--lovely:#B93B6F;--handy:#53A6E2;--bubbly:#FCCF41;--puzzly:#00A0A7;--stary:#7D49C8;--correct:#43B86A;--correct-light:#E6F7ED;--wrong:#E85252;--wrong-light:#FDEBEB;--bg:var(--lc-off-white);--text:var(--lc-navy);--text-light:#4A5A7A;--shadow:0 4px 16px rgba(0,24,72,.08);--font-title:'new-spirit','New Spirit','DM Serif Display',Georgia,serif;--font-body:'roc-grotesk','Roc Grotesk','DM Sans','Helvetica Neue',sans-serif}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;opacity:.6}.bg-blob.b1{width:400px;height:400px;top:-150px;left:-100px;background:radial-gradient(circle,rgba(83,166,226,.06),transparent 65%)}.bg-blob.b2{width:350px;height:350px;bottom:-120px;right:-80px;background:radial-gradient(circle,rgba(185,59,111,.05),transparent 65%)}
.app{max-width:540px;margin:0 auto;padding:20px 16px 28px;position:relative;z-index:1}
.brand-bar{text-align:center;margin-bottom:4px}.brand-bar img{height:40px}
.header{text-align:center;margin-bottom:6px}.header h1{font-family:var(--font-title);font-size:clamp(1.4rem,5vw,2rem);font-weight:700;color:var(--lc-navy)}.header h1 .accent{color:var(--lc-orange)}.header p{color:var(--text-light);font-size:.85rem;font-weight:500;margin-top:2px}
.wave-divider{width:100%;height:16px;margin:0 0 10px;overflow:hidden}.wave-divider svg{width:100%;height:100%}
.progress-wrap{margin-bottom:16px}.progress-bar{height:8px;background:var(--lc-warm-grey);border-radius:8px;overflow:hidden}.progress-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--lovely),var(--lc-orange));transition:width .4s}.progress-label{text-align:center;font-size:.75rem;font-weight:700;color:var(--text-light);margin-top:4px}
.stats{display:flex;justify-content:center;gap:12px;margin-bottom:16px}.stat{background:#fff;padding:6px 14px;border-radius:28px;box-shadow:var(--shadow);font-weight:700;font-size:.82rem;border:1.5px solid var(--lc-light-grey);display:flex;align-items:center;gap:6px}
.q-card{background:#fff;border-radius:20px;padding:28px 24px;box-shadow:var(--shadow);text-align:center;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-card .q-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--lc-orange);margin-bottom:6px}
.q-card .error-type{display:inline-block;padding:3px 12px;border-radius:16px;font-size:.72rem;font-weight:700;background:var(--lc-light-grey);color:var(--text-light);margin-bottom:12px}
.sentence-box{background:var(--lc-off-white);border:2px solid var(--lc-warm-grey);border-radius:12px;padding:16px;margin-bottom:18px;font-size:1.05rem;font-weight:600;line-height:1.5;color:var(--lc-navy)}
.sentence-box .error-word{color:var(--wrong);text-decoration:wavy underline;text-decoration-color:var(--wrong);text-underline-offset:4px}
.options{display:flex;flex-direction:column;gap:8px}
.opt-btn{border:2.5px solid var(--lc-warm-grey);background:#fff;border-radius:12px;padding:13px 16px;font-family:var(--font-body);font-size:.92rem;font-weight:600;color:var(--text);cursor:pointer;transition:all .25s;text-align:left}
.opt-btn:hover{border-color:var(--lc-orange);background:#FFF5EF;transform:translateY(-1px)}
.opt-btn.correct-pick{border-color:var(--correct);background:var(--correct-light);color:var(--correct)}
.opt-btn.wrong-pick{border-color:var(--wrong);background:var(--wrong-light);color:var(--wrong)}
.opt-btn:disabled{cursor:default;transform:none}
.explain{margin-top:14px;padding:12px;border-radius:10px;font-size:.85rem;font-weight:600;line-height:1.5;animation:fadeIn .3s}.explain.right{background:var(--correct-light);color:#2D7A48;border:1.5px solid rgba(67,184,106,.2)}.explain.wrong-answer{background:var(--wrong-light);color:#A13030;border:1.5px solid rgba(232,82,82,.2)}
.next-btn{margin-top:12px;padding:10px 28px;border:none;border-radius:10px;background:var(--lc-orange);color:#fff;font-family:var(--font-body);font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(255,100,45,.25)}.next-btn:hover{background:#E8571F;transform:translateY(-1px)}
.result-card{background:#fff;border-radius:24px;padding:32px 24px;box-shadow:0 12px 40px rgba(0,24,72,.1);text-align:center;animation:fadeIn .4s}.result-card h2{font-family:var(--font-title);font-size:1.7rem;font-weight:700;color:var(--lc-navy);margin-bottom:4px}.result-card .mascot-img{width:90px;height:90px;object-fit:contain;margin:10px auto;display:block}.result-card .score-big{font-family:var(--font-title);font-size:3rem;font-weight:700;color:var(--lc-orange)}.result-card .score-sub{font-size:.9rem;color:var(--text-light);font-weight:600;margin-bottom:16px}.stars{font-size:1.3rem;letter-spacing:4px;margin:6px 0}.result-btns{display:flex;gap:10px;margin-top:16px}.result-btns button{flex:1;padding:12px;border-radius:12px;font-family:var(--font-body);font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s}.btn-retry{border:2.5px solid var(--lc-navy);background:#fff;color:var(--lc-navy)}.btn-retry:hover{background:var(--lc-navy);color:#fff}
.footer{text-align:center;margin-top:18px;padding-top:12px;border-top:1.5px solid var(--lc-warm-grey)}.footer a{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--text-light);font-weight:600;font-size:.72rem;letter-spacing:.3px;transition:color .2s}.footer a:hover{color:var(--lc-orange)}.footer a img{height:18px;opacity:.45}
</style>
</head>

const QS=[
  {sentence:'the cat sat on the mat.',error:'the cat',errorType:'Capital letter',correct:'The cat sat on the mat.',options:['The cat sat on the mat.','the Cat sat on the mat.','the cat Sat on the mat.'],answer:0,tip:'Sentences always start with a capital letter.'},
  {sentence:'I went to the shop and buyed some milk.',error:'buyed',errorType:'Verb tense',correct:'I went to the shop and bought some milk.',options:['I went to the shop and bought some milk.','I went to the shop and buys some milk.','I went to the shop and buying some milk.'],answer:0,tip:'"Buy" is an irregular verb — its past tense is "bought", not "buyed".'},
  {sentence:'Where are you going.',error:'going.',errorType:'Punctuation',correct:'Where are you going?',options:['Where are you going?','Where are you going!','Where, are you going.'],answer:0,tip:'Questions need a question mark (?) at the end, not a full stop.'},
  {sentence:'The children was playing in the park.',error:'was',errorType:'Subject-verb agreement',correct:'The children were playing in the park.',options:['The children were playing in the park.','The children is playing in the park.','The children has playing in the park.'],answer:0,tip:'"Children" is plural, so we use "were" instead of "was".'},
  {sentence:'She dont like broccoli.',error:'dont',errorType:'Apostrophe',correct:"She doesn't like broccoli.",options:["She doesn't like broccoli.","She don't like broccoli.","She dont' like broccoli."],answer:0,tip:'"Doesn\'t" is the contraction of "does not" and needs an apostrophe.'},
  {sentence:'Me and Tom went to the cinema.',error:'Me and Tom',errorType:'Pronoun',correct:'Tom and I went to the cinema.',options:['Tom and I went to the cinema.','Me and Tom gone to the cinema.','Tom and me went to the cinema.'],answer:0,tip:'Use "I" (not "me") when you are the subject. "Tom and I" is more polite than putting yourself first.'},
  {sentence:'There going to the beach tomorrow.',error:'There',errorType:'Homophones',correct:"They're going to the beach tomorrow.",options:["They're going to the beach tomorrow.","Their going to the beach tomorrow.","Thier going to the beach tomorrow."],answer:0,tip:'"They\'re" means "they are". "There" is a place, and "their" shows ownership.'},
  {sentence:'The dog chased it\'s tail around the garden.',error:"it\'s",errorType:'Apostrophe',correct:'The dog chased its tail around the garden.',options:['The dog chased its tail around the garden.','The dog chased it is tail around the garden.','The dog chased its\' tail around the garden.'],answer:0,tip:'"Its" (no apostrophe) shows possession. "It\'s" always means "it is" or "it has".'},
  {sentence:'I have ate my lunch already.',error:'ate',errorType:'Verb tense',correct:'I have eaten my lunch already.',options:['I have eaten my lunch already.','I have eated my lunch already.','I has ate my lunch already.'],answer:0,tip:'After "have", we use the past participle. For "eat", that\'s "eaten" not "ate".'},
  {sentence:'The boy who lives next door he is my friend.',error:'door he',errorType:'Sentence structure',correct:'The boy who lives next door is my friend.',options:['The boy who lives next door is my friend.','The boy who lives next door, he is my friend.','The boy next door he are my friend.'],answer:0,tip:'We don\'t need to repeat the subject. "The boy who lives next door" is already the subject.'},
  {sentence:'I should of studied harder for the test.',error:'of',errorType:'Common mistake',correct:'I should have studied harder for the test.',options:['I should have studied harder for the test.','I should has studied harder for the test.','I should off studied harder for the test.'],answer:0,tip:'"Should have" is correct, not "should of". It sounds similar when spoken quickly, which causes confusion!'},
  {sentence:'Their are too many people hear.',error:'Their ... hear',errorType:'Homophones',correct:'There are too many people here.',options:['There are too many people here.','Their are too many people here.','They\'re are too many people hear.'],answer:0,tip:'"There" is for places, "their" shows ownership, and "here" is a place (not "hear" which means to listen).'}
];

let questions,current=0,score=0;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*i+1|0;[a[i],a[j]]=[a[j],a[i]]}return a}

function startGame(){
  questions=shuffle([...QS]).slice(0,10);
  // Shuffle options but track correct answer
  questions.forEach(q=>{
    const correctText=q.options[q.answer];
    const shuffled=shuffle([...q.options]);
    q.options=shuffled;
    q.answer=shuffled.indexOf(correctText);
  });
  current=0;score=0;renderQ();
}

function renderQ(){
  const q=questions[current];
  const pct=(current/questions.length)*100;
  let optsHtml=q.options.map((o,i)=>`<button class="opt-btn" onclick="pick(${i},this)">${o}</button>`).join('');
  document.getElementById('game-area').innerHTML=`
    <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-label">Question ${current+1} of ${questions.length}</div></div>
    <div class="stats"><div class="stat">✅ ${score}</div><div class="stat">❌ ${current-score}</div></div>
    <div class="q-card">
      <div class="q-label">Fix this sentence</div>
      <span class="error-type">${q.errorType}</span>
      <div class="sentence-box">${q.sentence}</div>
      <div class="options">${optsHtml}</div>
      <div id="feedback"></div>
    </div>`;
}

function pick(idx,btn){
  const q=questions[current];
  const correct=idx===q.answer;
  if(correct)score++;
  document.querySelectorAll('.opt-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.answer)b.classList.add('correct-pick');
    else if(i===idx&&!correct)b.classList.add('wrong-pick');
  });
  document.getElementById('feedback').innerHTML=`
    <div class="explain ${correct?'right':'wrong-answer'}"><strong>${correct?'✅ Correct!':'❌ Not quite.'}</strong> ${q.tip}</div>
    <button class="next-btn" onclick="${current<questions.length-1?'current++;renderQ()':'showResults()'}">${current<questions.length-1?'Next →':'See Results'}</button>`;
}

function showResults(){
  const pct=Math.round((score/questions.length)*100);
  const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':pct>=40?'⭐':'';
  const mi=pct>=80?4:pct>=60?3:pct>=40?2:pct>=20?1:0;
  document.getElementById('game-area').innerHTML=`
    <div class="result-card">
      <h2>${pct>=80?'Grammar Genius!':pct>=60?'Great effort!':'Keep practising!'}</h2>
      <img class="mascot-img" src="${MASCOTS[mi]}" alt="mascot"><div class="stars">${stars}</div>
      <div class="score-big">${score} / ${questions.length}</div>
      <div class="score-sub">${pct}% correct</div>
      <div class="result-btns"><button class="btn-retry" onclick="startGame()">Play Again</button></div>
    </div>`;
}
startGame();
</script>
